{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}{% endblock title %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Global CSS (Optional) -->
    <!--
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    -->

    <!-- Page Specific CSS -->
    {% block head %}
    {% endblock head %}

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="{% url 'homepage' %}">
                <img src="{% static 'image/Todomanager.png' %}"
                     alt="Todo Manager"
                     width="30"
                     height="24"
                     class="d-inline-block align-text-top">
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'homepage' %}active fw-bold{% endif %}"
                           href="{% url 'homepage' %}">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'contact' %}active fw-bold{% endif %}"
                           href="{% url 'contact' %}">
                            Contact Us
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'todolist' %}active fw-bold{% endif %}"
                           href="{% url 'todolist' %}">
                            Todolist
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'aboutus' %}active fw-bold{% endif %}"
                           href="{% url 'aboutus' %}">
                            About
                        </a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <div class="container mt-3">
        <h2>{% block heading %}{% endblock heading %}</h2>
    </div>

    {% block content %}
    {% endblock content %}

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Page Specific JavaScript -->
    {% block script %}
    {% endblock script %}

</body>
</html>
