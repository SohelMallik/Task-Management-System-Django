{% extends "base.html" %}
{% load static %}

{% block title %}
User Registration
{% endblock title %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center">
                    <h2>Create Account</h2>
                </div>

                <div class="card-body">

                    <!-- Success & Error Messages -->
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
<!-- Success & Error Messages  -->
                    <form method="POST">
                        {% csrf_token %}

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                Username
                            </label>
                            <input
                                type="text"
                                class="form-control"
                                id="username"
                                name="username"
                                placeholder="Enter Username"
                                required
                            >
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                Email
                            </label>
                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                name="email"
                                placeholder="Enter Email"
                                required
                            >
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password1" class="form-label">
                                Password
                            </label>
                            <input
                                type="password"
                                class="form-control"
                                id="password1"
                                name="password1"
                                placeholder="Enter Password"
                                required
                            >
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-3">
                            <label for="password2" class="form-label">
                                Confirm Password
                            </label>
                            <input
                                type="password"
                                class="form-control"
                                id="password2"
                                name="password2"
                                placeholder="Confirm Password"
                                required
                            >
                        </div>

                        <!-- Register Button -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                Register
                            </button>
                        </div>

                    </form>

                </div>

                <div class="card-footer text-center">
                    <small class="text-muted">
                        Registration Page
                    </small>
                </div>

            </div>

        </div>
    </div>
</div>

{% endblock content %}
